<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Neirosetka — Админ-панель</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0d0e12; --surface:#14161c; --card:#1a1d25; --card2:#23262f;
  --txt:#eceef2; --txt2:#9aa0ad; --txt3:#6b6f7a;
  --acc:#e24a82; --acc2:#8b7be0; --acc-soft:rgba(226,74,130,.15);
  --green:#37c98a; --red:#f0617a; --amber:#f0b429; --blue:#4a9be2; --teal:#2dd4bf;
  --line:rgba(255,255,255,.08); --r:14px; --r2:10px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#000;color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden}
.wrap{padding:14px 14px 96px}
.brandbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
.brand{font-size:18px;font-weight:600;letter-spacing:.4px}.brand span{color:var(--acc)}
.av{width:30px;height:30px;border-radius:50%;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:15px}
.hero{text-align:center;margin:6px 0 4px}
.hero .hi{width:58px;height:58px;border-radius:18px;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px}
.hero h1{font-size:19px;font-weight:600;margin:0}.hero p{font-size:12.5px;color:var(--txt2);margin:4px 0 0}
.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0 4px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:10px 8px;text-align:center}
.chip .v{font-size:15px;font-weight:600}.chip .l{font-size:10px;color:var(--txt2);margin-top:2px}
.chip .d{font-size:10px;margin-top:2px}
.glabel{font-size:12.5px;font-weight:600;color:var(--acc);margin:20px 4px 10px;display:flex;align-items:center;gap:7px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:.12s}
.card:active{transform:scale(.97);border-color:var(--acc)}.card.full{grid-column:1/-1}
.ic{width:36px;height:36px;border-radius:11px;background:var(--acc-soft);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lbl{font-size:13px;line-height:1.25}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 14px 8px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--line)}
.back{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--txt);cursor:pointer;font-size:18px;flex-shrink:0}
.back:active{transform:scale(.94)}.htitle{font-size:16px;font-weight:600}.hsub{font-size:11.5px;color:var(--txt2);margin-top:1px}
.row{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:12px;margin-bottom:9px;cursor:pointer;transition:.12s}
.row:active{transform:scale(.985);border-color:var(--acc)}.row .lbl2{font-size:13.5px}.row .sub{font-size:11.5px;color:var(--txt2);margin-top:2px}
.chev{margin-left:auto;color:var(--txt3);font-size:18px}
.tag{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag.g{background:rgba(55,201,138,.16);color:var(--green)}.tag.r{background:rgba(240,97,122,.16);color:var(--red)}
.tag.a{background:rgba(240,180,41,.16);color:var(--amber)}.tag.n{background:var(--card2);color:var(--txt2)}.tag.b{background:rgba(74,155,226,.16);color:var(--blue)}
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:12px}
.mlab{font-size:11.5px;color:var(--txt2)}.mval{font-size:20px;font-weight:700;margin-top:3px}
.delta{font-size:11px;margin-top:3px}.pos{color:var(--green)}.neg{color:var(--red)}
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:14px;gap:2px}
.seg button{flex:1;border:0;background:transparent;color:var(--txt2);font-size:12.5px;padding:8px 4px;border-radius:8px;cursor:pointer;font-weight:600}
.seg button.on{background:var(--acc);color:#fff}
label.fl{display:block;font-size:12px;color:var(--txt2);margin:12px 2px 6px}
input.f,textarea.f,select.f{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--r2);color:var(--txt);font-size:14px;padding:11px 12px;outline:none}
input.f:focus,textarea.f:focus{border-color:var(--acc)}textarea.f{min-height:96px;resize:vertical;font-family:inherit}
.btn{width:100%;background:var(--acc);color:#fff;border:0;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px}
.btn:active{transform:scale(.99)}.btn.sec{background:var(--card);color:var(--txt);border:1px solid var(--line)}
.btn.danger{background:rgba(240,97,122,.16);color:var(--red)}.btn.row2{margin-top:0}
.btns2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.sw{width:46px;height:27px;border-radius:14px;background:#3a3d47;position:relative;flex-shrink:0;cursor:pointer;transition:.15s;margin-left:auto}
.sw.on{background:var(--acc)}.sw b{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.15s}.sw.on b{left:22px}
.note{font-size:12px;color:var(--txt2);background:var(--card2);border-radius:var(--r2);padding:11px 12px;line-height:1.55;margin-top:12px}
.block{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.block h4{margin:0 0 10px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px}
.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-top:1px solid var(--line)}
.kv:first-of-type{border-top:0}.kv .k{color:var(--txt2)}.muted{color:var(--txt2)}
.bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin:8px 2px 22px}
.bars .b{flex:1;background:rgba(226,74,130,.18);border-radius:6px 6px 0 0;position:relative;min-height:3px}
.bars .b i{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--txt3);font-style:normal}
.bars .b span{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:9px;color:var(--txt2)}
.bars .b.hi{background:var(--acc)}
/* donut */
.donutwrap{display:flex;align-items:center;gap:18px}
.donut{width:118px;height:118px;border-radius:50%;flex-shrink:0;position:relative}
.dhole{position:absolute;inset:17px;background:var(--card);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dhole span{font-size:15px;font-weight:700;line-height:1}.dhole i{font-size:9.5px;color:var(--txt2);font-style:normal;margin-top:2px}
.legend{flex:1;min-width:0}.lg{font-size:12px;display:flex;align-items:center;gap:7px;padding:3px 0;color:var(--txt2)}
.lg b{margin-left:auto;color:var(--txt);font-weight:600}.dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
/* hbars */
.hb{margin-bottom:12px}.hb-l{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}.hb-l span{color:var(--txt2)}
.hb-t{height:9px;background:var(--card2);border-radius:6px;overflow:hidden}.hb-f{height:100%;border-radius:6px;background:var(--acc)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#fff;color:#111;font-size:13px;font-weight:600;padding:10px 18px;border-radius:24px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.show{opacity:1;bottom:34px}
.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;display:flex;background:var(--surface);border-top:1px solid var(--line);padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.tabbar a{flex:1;text-align:center;color:var(--txt3);font-size:10px;text-decoration:none;cursor:pointer}
.tabbar a i{display:block;font-size:20px;margin-bottom:3px}.tabbar a.on{color:var(--acc)}
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:9px 12px;margin-bottom:12px}
.search input{flex:1;background:transparent;border:0;outline:none;color:var(--txt);font-size:13.5px}
</style>
</head>
<body>
<div class="phone">
  <div id="app"></div>
  <div class="tabbar">
    <a class="on" onclick="goHome()"><i class="ti ti-layout-grid"></i>Разделы</a>
    <a onclick="open2('Статистика')"><i class="ti ti-chart-bar"></i>Статистика</a>
    <a onclick="open2('История платежей')"><i class="ti ti-receipt"></i>Заказы</a>
    <a onclick="open2('Прибыль')"><i class="ti ti-coin"></i>Прибыль</a>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ===== mock state ===== */
var S={toggles:{Suno:1,Kling:1,HeyGen:0,Higgsfield:1,Zoom:1,Krea:1,YouTube:0,
  "ChatGPT Mini App":1,"Claude Mini App":1,"Perplexity Mini App":1,Техработы:0,"Авто-исправление":1,
  "Plus ручная выдача":0,"Новый аккаунт ручная выдача":1},
  models:{"GPT Image 2":1,"Nano Banana":1,"Flux Pro":1,"Ideogram V3":1,"Recraft V3":0,
   "Veo 3.1":1,"Kling Turbo":1,"Seedance 1.5 Pro":1,"Kling Pro":0,"Nano Banana edit":1,"Flux Kontext":1,"Kling Motion":1,"Higgsfield Anim":0}};
var stack=[],app=document.getElementById('app');
var OVERVIEW=null;
var C={pink:"#e24a82",purple:"#8b7be0",teal:"#2dd4bf",amber:"#f0b429",blue:"#4a9be2",green:"#37c98a",red:"#f0617a",gray:"#5a5e6b"};

function toast(t){var e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show')},1400)}
function esc(s){return(''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function nf(n){return n.toLocaleString('ru')}
function go(fn,push){if(push!==false)stack.push(fn);window._cur=fn;window.scrollTo(0,0);app.innerHTML=fn();syncBack()}
function back(){stack.pop();var fn=stack[stack.length-1]||home;window._cur=fn;window._lastScreen=null;window.scrollTo(0,0);app.innerHTML=fn();syncBack()}
function syncBack(){var b=window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.BackButton;if(!b)return;try{if(window._cur&&window._cur!==home){b.show()}else{b.hide()}}catch(e){}}
function leaf(fn){window._lastScreen=null;go(fn)}
function open2(n){var same=(window._lastScreen===n);window._lastScreen=n;go(function(){return SCREENS[n]?SCREENS[n]():stub(n)}, !same)}
function goHome(){stack=[home];window._lastScreen="home";window._cur=home;window.scrollTo(0,0);app.innerHTML=home();syncBack()}
function hdr(t,s){return '<div class="hdr"><div class="back" onclick="back()"><i class="ti ti-chevron-left"></i></div><div><div class="htitle">'+esc(t)+'</div>'+(s?'<div class="hsub">'+esc(s)+'</div>':'')+'</div></div>'}
function sw(name){var k=name.replace(/'/g,"");return '<span class="sw'+(S.toggles[name]?' on':'')+'" onclick="S.toggles[\''+k+'\']=S.toggles[\''+k+'\']?0:1;this.classList.toggle(\'on\')"><b></b></span>'}
function rowItem(icon,label,sub,right,onclick){return '<div class="row" onclick="'+(onclick||'')+'"><span class="ic"><i class="ti '+icon+'"></i></span><div><div class="lbl2">'+esc(label)+'</div>'+(sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div>'+(right||'<span class="chev"><i class="ti ti-chevron-right"></i></span>')+'</div>'}
function stub(n){return hdr(n)+'<div class="wrap"><div class="note">Экран «'+esc(n)+'» — превью.</div></div>'}

/* ===== infographic helpers ===== */
function donut(segs,centerLab){var tot=segs.reduce(function(a,b){return a+b.val},0),acc=0;
  var stops=segs.map(function(s){var a=acc/tot*100;acc+=s.val;return s.color+' '+a.toFixed(1)+'% '+(acc/tot*100).toFixed(1)+'%'}).join(',');
  var leg=segs.map(function(s){return '<div class="lg"><span class="dot" style="background:'+s.color+'"></span>'+esc(s.label)+'<b>'+Math.round(s.val/tot*100)+'%</b></div>'}).join('');
  return '<div class="donutwrap"><div class="donut" style="background:conic-gradient('+stops+')"><div class="dhole"><span>'+(centerLab||nf(tot))+'</span><i>'+(centerLab?'':'всего')+'</i></div></div><div class="legend">'+leg+'</div></div>'}
function ring(pct,color,lab){return '<div class="donut" style="width:104px;height:104px;background:conic-gradient('+color+' 0 '+pct+'%,var(--card2) '+pct+'% 100%)"><div class="dhole"><span>'+pct+'%</span><i>'+esc(lab)+'</i></div></div>'}
function hbars(items,unit){var mx=Math.max.apply(0,items.map(function(i){return i.val}));return items.map(function(i){return '<div class="hb"><div class="hb-l">'+esc(i.label)+'<span>'+nf(i.val)+(unit||'')+'</span></div><div class="hb-t"><div class="hb-f" style="width:'+Math.max(4,Math.round(i.val/mx*100))+'%;background:'+(i.color||'var(--acc)')+'"></div></div></div>'}).join('')}
function prog(pct,color){return '<div class="hb-t"><div class="hb-f" style="width:'+Math.min(100,pct)+'%;background:'+(color||'var(--acc)')+'"></div></div>'}
function colbars(vals,labs,fmt){var mx=Math.max.apply(0,vals);return '<div class="bars">'+vals.map(function(v,i){return '<div class="b'+(v===mx?' hi':'')+'" style="height:'+Math.max(3,Math.round(v/mx*100))+'%"><span>'+(fmt?fmt(v):v)+'</span><i>'+labs[i]+'</i></div>'}).join('')+'</div>'}
function spark(vals,color){var w=320,h=64,mx=Math.max.apply(0,vals),mn=Math.min.apply(0,vals),rng=(mx-mn)||1;
  var pts=vals.map(function(v,i){return [(i/(vals.length-1)*w),(h-((v-mn)/rng)*(h-10)-5)]});
  var d='M'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1)}).join(' L');
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="none"><path d="'+d+' L'+w+','+h+' L0,'+h+' Z" fill="'+color+'22"/><path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round"/></svg>'}
function kpi(lab,val,delta){var up=delta>=0;return '<div class="mcard"><div class="mlab">'+esc(lab)+'</div><div class="mval">'+val+'</div><div class="delta '+(up?'pos':'neg')+'">'+(up?'▲':'▼')+' '+Math.abs(delta)+'% к вчера</div></div>'}

/* ===== HOME ===== */
function home(){
  var ov=OVERVIEW||{};
  var _ord=(ov.orders!=null?ov.orders:22),_rev=(ov.revenue!=null?ov.revenue:78140),_nu=(ov.newUsers!=null?ov.newUsers:9);
  var _week=(ov.week&&ov.week.length)?ov.week:[{value:52,label:"Пн",date:""},{value:61,label:"Вт",date:""},{value:48,label:"Ср",date:""},{value:73,label:"Чт",date:""},{value:69,label:"Пт",date:""},{value:90,label:"Сб",date:""},{value:78,label:"Вс",date:""}];
  var _pal=[C.pink,C.purple,C.teal,C.amber,C.blue,C.green];
  var _bysvc=(ov.byService&&ov.byService.length?ov.byService:[{label:"ChatGPT",val:39650},{label:"Claude",val:34512},{label:"App Store",val:5200},{label:"Perplexity",val:1990}]).map(function(x,i){return {label:x.label,val:x.val,color:_pal[i%_pal.length]}});
  var _wvals=_week.map(function(x){return (x&&x.value!=null)?x.value:x});var _wmx=Math.max.apply(0,_wvals)||1;var _wksum=_wvals.reduce(function(a,b){return a+(b||0)},0);
  var groups=[
   ["📊","Аналитика и финансы",[["📊","Статистика","Статистика"],["📈","Аналитика","Аналитика"],["💰","Прибыль","Прибыль"],["🛍️","Продажи","Продажи магазина"],["🧾","История платежей","История платежей",1]]],
   ["👥","Пользователи",[["🔎","Найти по ID","Найти по ID"],["💳","Балансы","Балансы"],["🚫","Блокировки","Блокировки",1]]],
   ["🛒","Каталог и цены",[["🎟️","Промокоды","Промокоды"],["🤖","Модели","Модели"],["💵","Редактор цен","Редактор цен"],["🤝","Рефералка","Премиум-рефералка"]]],
   ["📦","Выдача заказов",[["🔗","Оплата по ссылке","Оплата по ссылке"],["🔐","Вход в аккаунт","Вход в аккаунт"]]],
   ["⚙️","Управление",[["👋","Приветствие","Приветствие"],["📣","Рассылка","Рассылка"],["🛠️","Техобслуживание","Техобслуживание",1]]],
   ["📱","Mini Apps",[["✨","ChatGPT","ChatGPT Mini App"],["⚡","Claude","Claude Mini App"],["🔍","Perplexity","Perplexity Mini App"],["🍎","App Store","Настройка App Store"]]]
  ];
  var h='<div class="brandbar"><div class="brand">Neirosetka<span> admin</span></div><div class="av">🛡️</div></div><div class="wrap">';
  h+='<div class="hero"><div class="hi">🎛️</div><h1>Панель управления</h1><p>Сегодня · '+(new Date()).toLocaleDateString('ru')+'</p></div>';
  h+='<div class="chips"><div class="chip"><div class="v">'+_ord+'</div><div class="l">заказов</div></div><div class="chip"><div class="v">'+nf(_rev)+'₽</div><div class="l">выручка</div></div><div class="chip"><div class="v">'+_nu+'</div><div class="l">новых юзеров</div></div></div>';
  var _wbh='<div class="bars">'+_week.map(function(x){var v=(x&&x.value!=null)?x.value:x,dt=(x&&x.date)?x.date:'',lb=(x&&x.label)?x.label:'';return '<div class="b" style="height:'+Math.max(3,Math.round(v/_wmx*100))+'%;cursor:pointer" onclick="window._stDate=\''+dt+'\';open2(\'Статистика\')"><span>'+nf(v)+'</span><i>'+lb+'</i></div>'}).join('')+'</div>';
  h+='<div class="block"><h4>📈 Выручка за 7 дней <span class="muted" style="font-size:11px;font-weight:400">— нажми на день</span></h4>'+_wbh+'<div class="kv" style="margin-top:14px"><span class="k">Итого за неделю</span><span>'+nf(_wksum)+' ₽</span></div></div>';
  h+='<div class="block"><h4>🥧 Выручка по сервисам (сегодня)</h4>'+donut(_bysvc)+'</div>';
  groups.forEach(function(g){h+='<div class="glabel">'+g[0]+' '+g[1]+'</div><div class="grid">';g[2].forEach(function(c){h+='<div class="card'+(c[3]?' full':'')+'" onclick="open2(\''+c[2]+'\')"><span class="ic">'+c[0]+'</span><span class="lbl">'+c[1]+'</span></div>'});h+='</div>'});
  return h+'</div>';
}


var SCREENS={};

/* Статистика */
SCREENS["Статистика"]=function(){
  var per=window._stP||"day", date=window._stDate||"";
  setTimeout(function(){loadStats(per,date)},0);
  var seg='<div class="seg">'+["day:Сегодня","week:7 дней","month:30 дней"].map(function(x){var k=x.split(":")[0];return '<button class="'+(k===per&&!date?'on':'')+'" onclick="window._stP=\''+k+'\';window._stDate=\'\';open2(\'Статистика\')">'+x.split(":")[1]+'</button>'}).join('')+'</div>';
  var dp='<input class="f" type="date" value="'+date+'" onchange="window._stDate=this.value;open2(\'Статистика\')" style="margin-bottom:14px"/>';
  var sub=date?date:(per==="week"?"7 дней":per==="month"?"30 дней":"Сегодня");
  return hdr("Статистика",sub)+'<div class="wrap">'+seg+dp+'<div id="stbody"><div class="note">Загружаю…</div></div></div>';
};
function loadStats(per,date){
  api('/api/admin/stats',{period:per,date:date||null}).then(function(d){
    var el=document.getElementById('stbody'); if(!el)return;
    if(!d.ok){el.innerHTML='<div class="note">Нет доступа или ошибка.</div>';return;}

function loadModels(){
  api('/api/admin/models',{}).then(function(d){
    var el=document.getElementById('mdbody'); if(!el)return;
    if(!d.ok){el.innerHTML='<div class="note">Нет доступа или ошибка.</div>';return;}
    var h='';
    d.sections.forEach(function(sec){
      var on=sec.models.filter(function(m){return m.enabled}).length;
      h+='<div class="glabel">'+sec.title+' · '+on+'/'+sec.models.length+'</div>';
      sec.models.forEach(function(m){

      });
    });
    el.innerHTML=h;
  });
}
function toggleModel(elm,key,section){
  var on=!elm.classList.contains('on'); elm.classList.toggle('on');
  api('/api/admin/model-toggle',{key:key,section:section,enabled:on}).then(function(d){if(!d.ok){elm.classList.toggle('on');toast('Ошибка');}else{toast(on?'Включена':'Выключена');}});
}

SCREENS["Техобслуживание"]=function(){
  setTimeout(function(){loadSettings(function(d){var e=document.getElementById('maint_sw');if(e&&d.ok){if(d.maintenance)e.classList.add('on');else e.classList.remove('on');}})},0);
  return hdr("Техобслуживание")+'<div class="wrap"><div class="row" style="cursor:default"><span class="ic">🛠️</span><div><div class="lbl2">Режим техработ</div><div class="sub">бот отвечает заглушкой</div></div><span class="sw" id="maint_sw" onclick="toggleMaint(this)"><b></b></span></div><div class="note">Включает/выключает режим техработ для всех, кроме тебя.</div></div>';
};
function toggleMaint(elm){var on=!elm.classList.contains('on');elm.classList.toggle('on');api('/api/admin/setting-save',{kind:'maintenance',on:on}).then(function(d){if(!d.ok){elm.classList.toggle('on');toast('Ошибка');}else{toast(on?'Техработы включены':'Техработы выключены');}});}

/* Mini Apps */
function miniApp(name,svc){return function(){
  setTimeout(function(){loadMiniApp(svc)},0);
  return hdr(name)+'<div class="wrap"><div id="ma_'+svc+'"><div class="note">Загружаю…</div></div></div>';
}}
function loadMiniApp(svc){
  api('/api/admin/settings',{}).then(function(d){
    var el=document.getElementById('ma_'+svc); if(!el)return;
    if(!d.ok){el.innerHTML='<div class="note">Нет доступа или ошибка.</div>';return;}
    var m=(d.miniapps||[]).filter(function(x){return x.key===svc})[0]||{enabled:false,codes:0};
    var em={chatgpt:'✨',claude:'⚡',perplexity:'🔍'}[svc]||'📱';
    var h='<div class="row" style="cursor:default"><span class="ic">'+em+'</span><div><div class="lbl2">Приложение '+(m.enabled?'включено':'выключено')+'</div><div class="sub">активация у клиентов</div></div><span class="sw'+(m.enabled?' on':'')+'" onclick="toggleMiniApp(this,\''+svc+'\')"><b></b></span></div>';
    h+='<div class="block"><h4>🔑 Запас кодов</h4><div class="kv" style="border:0;padding-bottom:6px"><span class="k">В пуле</span><span>'+m.codes+' шт</span></div>'+prog(Math.min(100,m.codes*2),m.codes<10?C.red:C.green)+'</div>';
    h+='<div class="btns2"><button class="btn row2 sec" onclick="leaf(function(){return addCodes(\''+svc+'\')})">➕ Коды</button><button class="btn row2 sec" onclick="leaf(function(){return codesPool(\''+svc+'\')})">🗂 Пул</button></div>';
    h+='<div id="madet_'+svc+'"><div class="note">Загружаю активации…</div></div>';
    el.innerHTML=h;
    api('/api/admin/miniapp-detail',{service:svc}).then(function(dd){
      var de=document.getElementById('madet_'+svc); if(!de)return;
      if(!dd.ok){de.innerHTML='';return;}
      var hh='<div class="glabel" style="margin-top:16px">🧾 Последние активации</div>';
      if(!dd.recent.length){hh+='<div class="note">Пока нет активаций.</div>';}
      dd.recent.forEach(function(r){
        hh+='<div class="block"><div style="font-size:12.5px;font-weight:600">'+r.user+' · '+r.date+'</div><div class="sub" style="margin-top:4px">🔑 '+r.code+(r.acc?'<br>📧 '+r.acc:'')+(r.order?'<br>🆔 '+r.order:'')+'</div></div>';
      });
      de.innerHTML=hh;
    });
  });
}
function codesPool(svc){
  setTimeout(function(){loadPool(svc)},0);
  return hdr("Коды в пуле",svc)+'<div class="wrap"><button class="btn" onclick="leaf(function(){return addCodes(\''+svc+'\')})">➕ Добавить коды</button><div id="poolbody" style="margin-top:12px"><div class="note">Загружаю…</div></div></div>';
}
function loadPool(svc){
  api('/api/admin/miniapp-detail',{service:svc}).then(function(d){
    var el=document.getElementById('poolbody'); if(!el)return;
    if(!d.ok){el.innerHTML='<div class="note">Нет доступа или ошибка.</div>';return;}
    if(!d.free.length){el.innerHTML='<div class="note">Свободных кодов нет.</div>';return;}
    var h='<div class="glabel">🟢 Свободные ('+d.free.length+')</div>';
    d.free.forEach(function(c){
      h+='<div class="row" style="cursor:default"><span class="ic">🔑</span><div><div class="lbl2" style="font-size:12.5px">'+c.code+'</div><div class="sub">'+c.plan+'</div></div><button class="btn row2 danger" style="width:auto;margin:0;padding:7px 10px;font-size:12px" onclick="delCode(\''+svc+'\',\''+c.code+'\')">Удалить</button></div>';
    });
    el.innerHTML=h;
  });
}
function delCode(svc,code){
  if(window.confirm&&!window.confirm('Удалить код '+code+'?'))return;
  if(window.confirm&&!window.confirm('Точно удалить безвозвратно?'))return;
  api('/api/admin/code-delete',{service:svc,code:code}).then(function(d){toast(d.ok?'Удалён':'Ошибка');if(d.ok)loadPool(svc);});
}
function toggleMiniApp(elm,svc){var on=!elm.classList.contains('on');elm.classList.toggle('on');api('/api/admin/miniapp-toggle',{key:svc,enabled:on}).then(function(d){if(!d.ok){elm.classList.toggle('on');toast('Ошибка');}else{toast(on?'Включено':'Выключено');}});}
SCREENS["ChatGPT Mini App"]=miniApp("ChatGPT Mini App","chatgpt");
SCREENS["Claude Mini App"]=miniApp("Claude Mini App","claude");
SCREENS["Perplexity Mini App"]=miniApp("Perplexity Mini App","perplexity");
function addCodes(svc){
  var plans={chatgpt:[["plus","Plus"],["pro_5x","Pro 5×"],["go","Go"]],claude:[["pro","Pro"],["max_5x","Max 5×"],["max_20x","Max 20×"]],perplexity:[["pro","Pro"]]}[svc]||[["pro","Pro"]];
  var opts=plans.map(function(pp){return '<option value="'+pp[0]+'">'+pp[1]+'</option>'}).join('');
  return hdr("Добавить коды",svc)+'<div class="wrap"><label class="fl">Тариф</label><select class="f" id="ac_plan">'+opts+'</select><label class="fl">Коды (по одному в строке)</label><textarea class="f" id="ac_codes" placeholder="CODE-XXXX-XXXX"></textarea><button class="btn" onclick="doAddCodes(\''+svc+'\')">Добавить</button></div>';
}
function doAddCodes(svc){var codes=fv('ac_codes');if(!codes){toast('Вставь коды');return;}toast('Добавляю…');api('/api/admin/add-codes',{service:svc,plan:fv('ac_plan'),codes:codes}).then(function(d){toast(d.ok?('Добавлено '+d.added):(d.msg||'Ошибка'));if(d.ok)back();});}

SCREENS["Настройка App Store"]=function(){
  setTimeout(loadAppstore,0);
  return hdr("Настройка App Store")+'<div class="wrap"><div id="asbody"><div class="note">Загружаю…</div></div></div>';
};
function loadAppstore(){
  api('/api/admin/settings',{}).then(function(d){
    var el=document.getElementById('asbody'); if(!el)return;
    if(!d.ok){el.innerHTML='<div class="note">Нет доступа или ошибка.</div>';return;}
    var a=d.appstore||{};
    el.innerHTML='<label class="fl" style="margin-top:0">Курс закупа доллара (₽)</label><input class="f" id="as_rate" value="'+(a.rate||'')+'" inputmode="numeric"/><label class="fl">Наценка (%)</label><input class="f" id="as_markup" value="'+(a.markup||'')+'" inputmode="numeric"/><label class="fl">Порог остатка для алерта</label><input class="f" id="as_thr" value="'+(a.threshold||'')+'" inputmode="numeric"/><button class="btn" onclick="saveAppstore()">Сохранить</button>';
  });
}
function saveAppstore(){toast('Сохраняю…');api('/api/admin/setting-save',{kind:'appstore',rate:fv('as_rate'),markup:fv('as_markup'),threshold:fv('as_thr')}).then(function(d){toast(d.ok?'Сохранено ✓':'Ошибка');});}

function denied(){app.innerHTML='<div style="padding:70px 24px;text-align:center"><div style="font-size:48px">🔒</div><h1 style="font-size:18px;margin:10px 0 4px">Доступ только для администратора</h1><p style="color:var(--txt2);font-size:13px">Открой панель из своего аккаунта в боте.</p></div>';}
function boot(){
  var tg=window.Telegram&&window.Telegram.WebApp;
  if(tg){try{tg.ready();tg.expand();tg.setHeaderColor&&tg.setHeaderColor('#0d0e12');}catch(e){}}
  if(tg&&tg.BackButton){try{tg.BackButton.onClick(function(){back()});}catch(e){}}
  var initData=tg?tg.initData:"";
  go(home);
  fetch('/api/admin/overview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:initData})})
   .then(function(r){return r.json().then(function(d){return {s:r.status,d:d}})})
   .then(function(x){ if(x.s===403||!x.d||!x.d.ok){ denied(); return;} OVERVIEW=x.d; if(stack.length<=1){ go(home,false);} })
   .catch(function(){});
}
boot();
</script>
